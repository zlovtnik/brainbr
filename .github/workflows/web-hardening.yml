name: Web Hardening

on:
  pull_request:
    paths:
      - ".github/workflows/web-hardening.yml"
      - "apps/web/**"
      - "docs/svelte5-interactive-project.md"
      - "docs/web-hardening.md"
      - "docs/web-patterns.md"
      - "package.json"
      - "bun.lock"

jobs:
  web-hardening:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Run unit tests
        run: bun --filter web test:unit

      - name: Run Svelte checks
        run: bun --filter web check

      - name: Run end-to-end and accessibility checks
        run: bun --filter web test:e2e:ci
