spring:
  application:
    name: fiscalbrain-br
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/fiscalbrain}
    username: ${DB_USER:fiscal_user}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:10}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DB:0}
      password: ${REDIS_PASSWORD:}
  flyway:
    enabled: true
    baseline-on-migrate: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    root: ${LOG_LEVEL:INFO}
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} request_id=%X{request_id:-} company_id=%X{company_id:-} - %msg%n"

app:
  models:
    embedding: ${EMBEDDING_MODEL:text-embedding-3-small}
    llm: ${LLM_MODEL:gpt-4o}
  providers:
    mode: ${MODEL_PROVIDER_MODE:real}
    openai:
      base-url: ${APP_PROVIDERS_OPENAI_BASE_URL:https://api.openai.com/v1}
      api-key: ${APP_PROVIDERS_OPENAI_API_KEY:${OPENAI_API_KEY:}}
  queue:
    stream:
      ingestion: ${APP_QUEUE_STREAM_INGESTION:queue_ingestion}
      audit: ${APP_QUEUE_STREAM_AUDIT:queue_audit}
      reporting: ${APP_QUEUE_STREAM_REPORTING:queue_reporting}
      ingestion-dlq: ${APP_QUEUE_STREAM_INGESTION_DLQ:queue_ingestion_dlq}
      audit-dlq: ${APP_QUEUE_STREAM_AUDIT_DLQ:queue_audit_dlq}
    group:
      ingestion: ${APP_QUEUE_GROUP_INGESTION:ingestion-workers}
      audit: ${APP_QUEUE_GROUP_AUDIT:audit-workers}
    retry:
      max-attempts: ${APP_QUEUE_RETRY_MAX_ATTEMPTS:3}
      base-backoff-ms: ${APP_QUEUE_RETRY_BASE_BACKOFF_MS:1000}
  worker:
    heartbeat-interval-ms: ${WORKER_HEARTBEAT_INTERVAL_MS:60000}
    ingestion-poll-interval-ms: ${WORKER_INGESTION_POLL_INTERVAL_MS:2000}
    audit-poll-interval-ms: ${WORKER_AUDIT_POLL_INTERVAL_MS:2000}
  security:
    jwt:
      issuer-uri: ${APP_SECURITY_JWT_ISSUER_URI:}
      jwk-set-uri: ${APP_SECURITY_JWT_JWK_SET_URI:}
      tenant-claim: ${APP_SECURITY_JWT_TENANT_CLAIM:tenant_id}

---
spring:
  config:
    activate:
      on-profile: worker
  main:
    web-application-type: none
